<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>空きびん、発泡スチロール、新聞ごみ一覧</title>
<link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>
<table id="targetTable">
    <th>空きびん、発泡スチロール、新聞ごみ一覧</th>
</table>
<a href="ogawa.html"><button>戻る</button></a>
<script>
    var akibinitiran = ['ガラスびん','酒カップ（素材：ガラス）','食品トレイ（色柄付）（素材：プラスチック）','新聞','発泡スチロール']
    window.onload = function() {
        for (var i = 0; i < akibinitiran.length; i++) {
            let table = document.getElementById('targetTable');
            let newRow = table.insertRow();
            let newCell = newRow.insertCell();
            let newText = document.createTextNode(akibinitiran[i]);
            newCell.appendChild(newText);
        }
    }
</script>
</body>
</html>
